<!DOCTYPE html>
<html>
<head>
  <title>Retro Gamez</title>
  <style>
    body {
      background: #000080;
      color: #fff;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-align: center;
      padding-top: 60px;
    }
    h1 {
      font-size: 36px;
      color: #ffff00;
      margin-bottom: 6px;
    }
    p {
      font-size: 13px;
      color: #00ff00;
      margin-bottom: 50px;
    }
    .consoles {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
    }
    a {
      display: inline-block;
      text-decoration: none;
    }
    a img {
      width: 180px;
      display: block;
      margin: 0 auto 10px;
    }
    a span {
      color: #fff;
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 13px;
      display: block;
    }
    a:hover span {
      color: #ffff00;
    }
  </style>
</head>
<body>
  <h1>RETRO GAMEZ</h1>
  <p>pick a system</p>

  <div class="consoles">
    <a href="games.html?console=nes">
      <img src="images/nes.png" alt="NES">
      <span>NINTENDO NES</span>
    </a>
    <a href="games.html?console=snes">
      <img src="images/snes.png" alt="SNES">
      <span>SUPER NINTENDO</span>
    </a>
    <a href="games.html?console=gba">
      <img src="images/gba.png" alt="GBA">
      <span>GAME BOY ADVANCE</span>
    </a>
    <a href="games.html?console=gbc">
      <img src="images/gbc.png" alt="GBC">
      <span>GAME BOY COLOR</span>
    </a>
    <a href="games.html?console=n64">
      <img src="images/n64.png" alt="N64">
      <span>NINTENDO 64</span>
    </a>
    <a href="games.html?console=genesis">
      <img src="images/genesis.png" alt="Genesis">
      <span>SEGA GENESIS</span>
    </a>
  </div>
</body>
</html>
